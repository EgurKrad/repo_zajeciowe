<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zgadnij zwierzę</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="{{ url_for('main.index') }}">Strona główna</a>
            <a href="{{ url_for('main.game') }}">Gra</a>
            <a href="{{ url_for('main.animals') }}">Zwierzęta</a>
            <a href="{{ url_for('main.add_animal') }}">Dodaj zwierzę</a>
        </div>

        <div class="nav-right">
            {% if session.get("username") %}
                <span>
                    {{ session["username"] }}
                    ({{ session["role"] }})
                </span>
                <a href="{{ url_for('main.logout') }}">Wyloguj</a>
            {% else %}
                <a href="{{ url_for('main.login') }}">Login</a>
                <a href="{{ url_for('main.register') }}">Rejestracja</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
